<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 2026: Desafíos Reales del Dinamizador TIC</title>
    <style>
        :root { --minerd-blue: #004a99; --accent: #007bff; --success: #28a745; --danger: #dc3545; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .quiz-container { background: white; width: 100%; max-width: 850px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); overflow: hidden; }
        .header { background: var(--minerd-blue); color: white; padding: 30px; text-align: center; }
        .progress-bar { height: 10px; background: #e0e0e0; width: 100%; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.5s; }
        .stats { display: flex; justify-content: space-between; padding: 15px 30px; background: #f1f1f1; font-weight: bold; font-size: 0.95em; border-bottom: 1px solid #ddd; }
        .content { padding: 40px; min-height: 400px; }
        .tag { font-size: 0.8em; text-transform: uppercase; background: #e7f0ff; color: var(--minerd-blue); padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 20px; letter-spacing: 1px; }
        .question-text { font-size: 1.25em; font-weight: 600; color: #333; margin-bottom: 30px; line-height: 1.5; }
        .options-grid { display: grid; gap: 15px; }
        .option-btn { text-align: left; padding: 18px; border: 2px solid #dee2e6; border-radius: 10px; background: white; cursor: pointer; transition: 0.3s; font-size: 1.05em; color: #444; }
        .option-btn:hover:not(:disabled) { border-color: var(--accent); background: #f0f7ff; transform: translateY(-2px); }
        .option-btn.correct { background: #d4edda !important; border-color: var(--success) !important; color: #155724; font-weight: bold; }
        .option-btn.incorrect { background: #f8d7da !important; border-color: var(--danger) !important; color: #721c24; }
        .feedback { margin-top: 25px; padding: 20px; border-radius: 10px; display: none; line-height: 1.6; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .feedback.correct { background: #e6fffa; border-left: 5px solid #38b2ac; color: #234e52; }
        .feedback.incorrect { background: #fff5f5; border-left: 5px solid #feb2b2; color: #822727; }
        .footer { padding: 25px 40px; text-align: right; background: #f8f9fa; border-top: 1px solid #eee; }
        .btn-action { background: var(--minerd-blue); color: white; border: none; padding: 15px 35px; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; display: none; }
        .result-screen { text-align: center; padding: 60px 20px; display: none; }
        .score-circle { width: 180px; height: 180px; border-radius: 50%; border: 12px solid var(--minerd-blue); display: flex; align-items: center; justify-content: center; font-size: 3.5em; font-weight: 800; margin: 30px auto; color: var(--minerd-blue); }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h2 style="margin:0; letter-spacing: 1px;">ERP 2026: CASOS DE DESEMPEÑO DOCENTE</h2>
        <p style="margin: 10px 0 0 0; opacity: 0.9;">Escuela Primaria Prof. Luz María Batista Germán</p>
    </div>
    <div class="progress-bar"><div id="progFill" class="progress-fill"></div></div>
    <div class="stats">
        <span>Caso <span id="qIdx">1</span> de 15</span>
        <span>Puntos: <span id="score">0</span></span>
    </div>

    <div id="quizBody" class="content">
        <div id="blockTag" class="tag"></div>
        <div id="qText" class="question-text"></div>
        <div id="optionsArea" class="options-grid"></div>
        <div id="feedback" class="feedback"></div>
    </div>

    <div id="resultArea" class="result-screen">
        <div class="tag">Evaluación Finalizada</div>
        <div class="score-circle" id="finalScore">0</div>
        <p id="resultMsg" style="font-size: 1.3em; color: #555; max-width: 600px; margin: 0 auto;"></p>
        <button class="btn-action" style="display:inline-block; margin-top: 30px;" onclick="location.reload()">Reiniciar Simulacro</button>
    </div>

    <div class="footer" id="quizFooter">
        <button id="nextBtn" class="btn-action" onclick="nextQuestion()">Siguiente Caso</button>
    </div>
</div>

<script>
    const casos = [
        {
            t: "Acompañamiento y Adecuación Curricular",
            q: "Una docente de 4to grado en la Escuela Luz María Batista Germán está trabajando el tema de los Símbolos Patrios. Ella quiere que los niños 'hagan algo en la computadora' pero no sabe qué. Según la Ordenanza 04-2023, ¿cuál es tu intervención correcta?",
            o: [
                "Sugerirle que los niños busquen fotos de la bandera en Google y las peguen en Word.",
                "Colaborar en su planificación para diseñar una WebQuest donde los alumnos investiguen el origen de los símbolos y creen un mural digital (Padlet) con sus hallazgos.",
                "Darle un CD con videos del himno nacional para que los proyecte durante la clase.",
                "Decirle que use el software que ya viene instalado en las laptops y que te avise si alguna no enciende."
            ],
            c: 1,
            r: "El dinamizador debe asegurar que la TIC sea un medio para lograr la competencia (investigación y ética ciudadana), no solo un sustituto del papel."
        },
        {
            t: "Marco Legal y Gestión",
            q: "Un padre llega molesto al centro porque a su hijo le bloquearon el acceso a YouTube en la tablet del MINERD. Basado en la Política de Uso de Dispositivos, ¿qué respuesta es la legalmente correcta?",
            o: [
                "Pedirle disculpas y desbloquear el acceso de inmediato para evitar conflictos con la comunidad.",
                "Explicar que los dispositivos son propiedad del Estado y están configurados para fines estrictamente educativos, según el compromiso firmado al recibirlos.",
                "Decirle que la culpa es del técnico distrital y que usted no tiene las claves de acceso.",
                "Sugerirle que compre una tablet privada si quiere que su hijo vea videos libres."
            ],
            c: 1,
            r: "Los equipos del MINERD están sujetos a normativas de seguridad y propósito pedagógico que el dinamizador debe defender."
        },
        {
            t: "Inclusión y DUA",
            q: "En 6to grado hay un estudiante con baja visión. El docente de Ciencias Naturales usará un simulador de circuitos. ¿Cómo aplicas el DUA como Dinamizador?",
            o: [
                "Pedir al estudiante que solo escuche la clase mientras los demás usan la laptop.",
                "Configurar herramientas de accesibilidad (lupa, alto contraste) y buscar un simulador con soporte de audio o etiquetas de texto grandes.",
                "Sugerir al docente que ese estudiante haga la tarea en el cuaderno con letras grandes mientras los otros usan la TIC.",
                "Exonerar al estudiante de la práctica tecnológica para que no se fuerce la vista."
            ],
            c: 1,
            r: "El Diseño Universal para el Aprendizaje exige que la tecnología elimine barreras, no que segregue al estudiante."
        },
        {
            t: "Planificación y Situación de Aprendizaje",
            q: "Estás ayudando a planificar una unidad sobre 'El Cambio Climático'. El docente no tiene una Situación de Aprendizaje clara. ¿Qué propuesta es la más innovadora y tecnológica?",
            o: [
                "Los estudiantes leerán un PDF sobre el calentamiento global y responderán un cuestionario en Moodle.",
                "Un reto: 'Somos reporteros del clima'. Los alumnos usarán sensores de las tablets para medir la temperatura del patio y crearán un reporte multimedia sobre el microclima escolar.",
                "Los alumnos verán una película sobre el deshielo y harán un resumen en Microsoft Word.",
                "El docente dará una charla magistral usando diapositivas con muchas imágenes de glaciares."
            ],
            c: 1,
            r: "Una Situación de Aprendizaje efectiva debe partir de un reto o problema real donde la TIC sea la herramienta de investigación."
        },
        {
            t: "Ética y Ciudadanía Digital",
            q: "Te das cuenta de que un grupo de docentes comparte fotos de los registros de grado (con nombres y notas) por un grupo abierto de Facebook. ¿Cuál es tu proceder ético?",
            o: [
                "Darle 'Me gusta' para apoyar el trabajo de tus colegas.",
                "Orientarlos en una reunión técnica sobre la Ley de Protección de Datos y la importancia de la confidencialidad de la información de los menores.",
                "Ignorarlo, ya que es la cuenta personal de los docentes y usted no es su jefe.",
                "Reportarlos anónimamente a la Policía Escolar."
            ],
            c: 1,
            r: "El dinamizador es el líder de la ética digital en el centro y debe proteger la integridad de los datos de los estudiantes."
        },
        {
            t: "Pensamiento Computacional",
            q: "El Director quiere que los niños de 5to grado empiecen con Pensamiento Computacional. No hay internet ese día. ¿Qué actividad diriges?",
            o: [
                "Suspender la actividad hasta que regrese el internet.",
                "Realizar una actividad 'unplugged' (desconectada) de algoritmos, donde los niños deben dar instrucciones exactas para que un compañero cruce un 'laberinto' en el piso.",
                "Pedirles que dibujen una computadora en sus cuadernos.",
                "Ponerlos a jugar solitario en las laptops porque eso no requiere internet."
            ],
            c: 1,
            r: "El pensamiento computacional es una forma de razonar (lógica/algoritmos) que puede desarrollarse con o sin dispositivos."
        },
        {
            t: "Evaluación por Competencias",
            q: "Un docente quiere evaluar la competencia 'Comunicativa' a través de la creación de un Podcast. ¿Qué instrumento de evaluación le ayudas a diseñar?",
            o: [
                "Un examen escrito sobre qué es un Podcast.",
                "Una Rúbrica Analítica que evalúe claridad de voz, estructura del guion, uso de música y calidad del mensaje.",
                "Una lista de cotejo que solo diga 'Entregó' o 'No entregó'.",
                "Ponerle la nota según lo bonito que suene el audio."
            ],
            c: 1,
            r: "La evaluación por competencias requiere instrumentos que valoren niveles de desempeño específicos, como la rúbrica."
        },
        {
            t: "Gestión de Conflictos",
            q: "Un maestro se niega a usar la PDI porque dice que 'eso da mucha luz y le duele la cabeza'. ¿Cómo actúas bajo tu rol de Dinamizador?",
            o: [
                "Decirle al Director que el maestro es un tecnófobo y que deben sancionarlo.",
                "Ajustar el brillo de la pantalla, ofrecerle un teclado inalámbrico para que la use de lejos y acompañarlo en una actividad corta de 15 minutos.",
                "Dejar de invitarlo a las capacitaciones TIC para no molestarlo.",
                "Quitar la PDI de su aula y ponérsela a un maestro que sí la quiera."
            ],
            c: 1,
            r: "Tu rol es buscar soluciones técnicas y pedagógicas para facilitar la adopción tecnológica, no forzarla ni castigarla."
        },
        {
            t: "Estrategias de Enseñanza",
            q: "Para el proyecto 'Macetas Inteligentes', necesitas que los alumnos de 6to grado recolecten datos cada día. ¿Qué estrategia TIC es la más adecuada?",
            o: [
                "Que anoten en el cuaderno y luego tú lo pases a la computadora del centro.",
                "Uso de un formulario compartido o una hoja de cálculo en la nube donde cada equipo registre sus mediciones en tiempo real.",
                "Que le tomen una foto a la maceta y te la manden por WhatsApp.",
                "Imprimir una tabla y pegarla en la puerta del laboratorio."
            ],
            c: 1,
            r: "Fomenta la autonomía y la competencia tecnológica al hacer que ellos gestionen sus propios datos digitales."
        },
        {
            t: "Seguridad y Normativa",
            q: "Descubres que un estudiante instaló un programa para espiar las cámaras de las laptops de sus compañeros. Según el Reglamento de Convivencia Escolar y TIC:",
            o: [
                "Felicitarlo por sus habilidades avanzadas de hacking.",
                "Aislar el equipo, reportar la falta grave al equipo de gestión y realizar una charla sobre delitos informáticos y privacidad.",
                "Formatear la laptop y no decirle nada a nadie para no asustar a los padres.",
                "Quitarle la laptop al niño y dársela a un estudiante que se porte mejor."
            ],
            c: 1,
            r: "La seguridad digital es un tema de convivencia y legalidad. Se debe seguir el debido proceso pedagógico-disciplinario."
        },
        {
            t: "Metacognición y TIC",
            q: "Al final de un taller de Scratch, quieres que los alumnos realicen 'Metacognición'. ¿Qué actividad TIC les propones?",
            o: [
                "Un examen de 10 preguntas sobre los bloques de código.",
                "Grabar un breve video (Vlog) explicando qué fue lo que más se les dificultó, cómo lo resolvieron y para qué les sirve saber programar.",
                "Que copien la definición de 'programación' tres veces.",
                "Que jueguen el juego que hicieron sus compañeros."
            ],
            c: 1,
            r: "La metacognición es reflexionar sobre el proceso de aprendizaje; los medios audiovisuales son excelentes para esta expresión."
        },
        {
            t: "Gestión de Recursos",
            q: "El inventario del centro muestra que faltan 5 laptops de un lote recién llegado. El Director te pide que 'arregles los números' en el reporte oficial. ¿Qué haces?",
            o: [
                "Hacer lo que dice el Director para mantener tu puesto y evitar conflictos.",
                "Informar por escrito la discrepancia real, realizar el levantamiento de firmas y reportar la pérdida según el protocolo administrativo del MINERD.",
                "Decir que las laptops se dañaron y que las tiraste a la basura.",
                "Pedir prestadas 5 laptops a otra escuela para que la auditoría no note nada."
            ],
            c: 1,
            r: "La ética profesional y la transparencia en el manejo de bienes públicos son innegociables para un docente/dinamizador."
        },
        {
            t: "Colaboración Profesional",
            q: "La coordinadora pedagógica te pide ayuda para que los resultados de las Pruebas Nacionales del centro se analicen visualmente. ¿Qué acción tomas?",
            o: [
                "Decirle que eso no es parte de las TIC y que ella debe usar su calculadora.",
                "Diseñar un tablero de control (Dashboard) en Excel o Data Studio que muestre las debilidades por asignatura para tomar decisiones curriculares.",
                "Escribir los promedios en una pizarra en la sala de profesores.",
                "Mandar un correo a cada profesor con su promedio individual."
            ],
            c: 1,
            r: "El dinamizador TIC es un socio estratégico en la gestión de datos para la mejora de la calidad educativa del centro."
        },
        {
            t: "IA y Honestidad Académica",
            q: "Un grupo de alumnos entrega un trabajo de Historia impecable, pero sospechas que fue hecho 100% por Inteligencia Artificial sin análisis. ¿Cómo abordas el caso?",
            o: [
                "Ponerles 100 puntos porque el trabajo se ve muy profesional.",
                "Realizar una entrevista de retroalimentación pidiéndoles que expliquen los conceptos y debatir sobre el uso ético de la IA como asistente, no como sustituto.",
                "Reprobarlos de inmediato y prohibir el uso de IA en toda la escuela.",
                "Ignorar el hecho porque no hay una ley que prohíba la IA todavía."
            ],
            c: 1,
            r: "La IA es una oportunidad pedagógica; el dinamizador debe enseñar a usarla con espíritu crítico y honestidad."
        },
        {
            t: "Evaluación de Impacto",
            q: "Al finalizar el año escolar, el Distrito te pide evidencias del impacto de tu labor. ¿Qué entregas?",
            o: [
                "Una lista de todas las computadoras que arreglaste.",
                "Un portafolio con planes de acompañamiento, productos digitales creados por alumnos y estadísticas de uso pedagógico de las aulas TIC.",
                "Fotos tuyas trabajando en la oficina.",
                "Una carta del Director diciendo que eres muy buen trabajador."
            ],
            c: 1,
            r: "El impacto se demuestra con evidencias de mejora en los procesos de enseñanza y aprendizaje mediado por TIC."
        }
    ];

    let current = 0;
    let score = 0;
    let shuffledOpts = [];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function render() {
        const data = casos[current];
        document.getElementById('blockTag').innerText = data.t;
        document.getElementById('qText').innerText = data.q;
        document.getElementById('qIdx').innerText = current + 1;
        document.getElementById('score').innerText = score;

        const area = document.getElementById('optionsArea');
        area.innerHTML = '';
        
        shuffledOpts = data.o.map((text, index) => ({ text, isCorrect: index === data.c }));
        shuffle(shuffledOpts);

        shuffledOpts.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => check(idx);
            area.appendChild(btn);
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
        
        const prog = (current / casos.length) * 100;
        document.getElementById('progFill').style.width = prog + '%';
    }

    function check(idx) {
        const btns = document.querySelectorAll('.option-btn');
        const fb = document.getElementById('feedback');
        btns.forEach(b => b.disabled = true);

        if (shuffledOpts[idx].isCorrect) {
            score++;
            btns[idx].classList.add('correct');
            fb.innerHTML = `<strong>✅ RESOLUCIÓN CORRECTA:</strong> ${casos[current].r}`;
            fb.className = 'feedback correct';
        } else {
            btns[idx].classList.add('incorrect');
            const cPos = shuffledOpts.findIndex(o => o.isCorrect);
            btns[cPos].classList.add('correct');
            fb.innerHTML = `<strong>❌ ERROR DE CRITERIO:</strong> ${casos[current].r}`;
            fb.className = 'feedback incorrect';
        }

        fb.style.display = 'block';
        document.getElementById('nextBtn').style.display = 'inline-block';
        document.getElementById('score').innerText = score;
    }

    function nextQuestion() {
        current++;
        if (current < casos.length) {
            render();
        } else {
            finish();
        }
    }

    function finish() {
        document.getElementById('quizBody').style.display = 'none';
        document.getElementById('quizFooter').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('progFill').style.width = '100%';
        document.getElementById('finalScore').innerText = score;
        
        const msg = document.getElementById('resultMsg');
        const p = (score / casos.length) * 100;
        if (p >= 90) msg.innerText = "¡Nivel de Desempeño Sobresaliente! Tienes una visión pedagógica y técnica de alto nivel para tu centro escolar.";
        else if (p >= 70) msg.innerText = "¡Buen Trabajo! Conoces los procesos básicos, pero recuerda siempre priorizar el acompañamiento pedagógico.";
        else msg.innerText = "Nivel Mejorable. Te recomendamos repasar el Manual de Puestos y las nuevas Ordenanzas de adecuación curricular.";
    }

    render();
</script>

</body>
</html>
