<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 2026: Bloque III - Innovación y Hardware Pro</title>
    <style>
        :root { --minerd-dark: #002d5a; --minerd-blue: #004a99; --gold: #ffd700; --success: #28a745; --danger: #dc3545; --bg: #eef2f7; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .quiz-card { background: white; width: 100%; max-width: 850px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: var(--minerd-dark); color: white; padding: 30px; text-align: center; border-bottom: 6px solid var(--gold); }
        .progress-bar { height: 12px; background: #dfe6ed; width: 100%; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.6s cubic-bezier(0.1, 0.7, 1.0, 0.1); }
        .stats { display: flex; justify-content: space-between; padding: 15px 30px; background: #fff; font-weight: bold; color: var(--minerd-blue); border-bottom: 1px solid #eee; }
        .content { padding: 40px; min-height: 420px; }
        .tag { font-size: 0.8em; text-transform: uppercase; background: #fff3cd; color: #856404; padding: 6px 16px; border-radius: 50px; display: inline-block; margin-bottom: 25px; font-weight: 800; border: 1px solid #ffeeba; }
        .question-text { font-size: 1.3em; font-weight: 600; color: #1a202c; margin-bottom: 30px; line-height: 1.6; }
        .options-grid { display: grid; gap: 15px; }
        .option-btn { text-align: left; padding: 18px; border: 2px solid #e2e8f0; border-radius: 12px; background: white; cursor: pointer; transition: 0.2s all; font-size: 1.05em; color: #2d3748; }
        .option-btn:hover:not(:disabled) { border-color: var(--minerd-blue); background: #f7fafc; transform: scale(1.01); }
        .option-btn.correct { background: #c6f6d5 !important; border-color: var(--success) !important; color: #22543d; font-weight: bold; }
        .option-btn.incorrect { background: #fed7d7 !important; border-color: var(--danger) !important; color: #822727; }
        .feedback { margin-top: 25px; padding: 20px; border-radius: 12px; display: none; line-height: 1.6; animation: slideUp 0.5s ease; border-left: 6px solid; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .feedback.correct { background: #f0fff4; border-color: var(--success); color: #22543d; }
        .feedback.incorrect { background: #fff5f5; border-color: var(--danger); color: #822727; }
        .footer { padding: 30px 40px; text-align: right; background: #f7fafc; border-top: 1px solid #edf2f7; }
        .btn-next { background: var(--minerd-blue); color: white; border: none; padding: 14px 35px; border-radius: 8px; cursor: pointer; font-size: 1.1em; display: none; font-weight: bold; box-shadow: 0 4px 12px rgba(0,74,153,0.3); }
        .result-screen { text-align: center; padding: 60px 40px; display: none; }
        .final-badge { font-size: 5em; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="quiz-card">
    <div class="header">
        <h2 style="margin:0; text-transform: uppercase;">ERP 2026: NIVEL EXPERTO - INNOVACIÓN</h2>
        <p style="margin:8px 0 0 0; font-size: 0.95em;">Evaluación Final de Competencias Avanzadas</p>
    </div>
    <div class="progress-bar"><div id="progFill" class="progress-fill"></div></div>
    <div class="stats">
        <span>Caso <span id="qIdx">31</span> de 50</span>
        <span>Efectividad: <span id="score">0</span> pts</span>
    </div>

    <div id="quizBody" class="content">
        <div id="blockTag" class="tag"></div>
        <div id="qText" class="question-text"></div>
        <div id="optionsArea" class="options-grid"></div>
        <div id="feedback" class="feedback"></div>
    </div>

    <div id="resultArea" class="result-screen">
        <div class="final-badge" id="badge">🏅</div>
        <h2>Evaluación Profesional Completada</h2>
        <div style="font-size: 3em; font-weight: 800; color: var(--minerd-blue);" id="finalScore">0</div>
        <p id="resultMsg" style="font-size: 1.2em; color: #4a5568; margin-bottom: 30px;"></p>
        <button class="btn-next" style="display:inline-block;" onclick="location.reload()">Reiniciar Evaluador Especializado</button>
    </div>

    <div class="footer" id="quizFooter">
        <button id="nextBtn" class="btn-next" onclick="nextQuestion()">Continuar Proceso</button>
    </div>
</div>

<script>
    const casos = [
        {
            t: "Inteligencia Artificial en el Aula",
            q: "Un docente de 6to grado te pide ayuda para usar la IA en su clase. Él quiere que la IA le dé un examen de 20 preguntas sobre la Independencia Nacional. ¿Cuál es tu asesoría crítica?",
            o: [
                "Copiar las preguntas de ChatGPT y pegarlas directamente en un examen impreso.",
                "Enseñarle a diseñar un 'Prompt' que incluya el contexto del currículo dominicano, pedirle que verifique los datos (evitar alucinaciones) y que adapte el lenguaje al nivel de sus estudiantes.",
                "Decirle que el uso de IA para exámenes está prohibido por el MINERD hasta que salga una ordenanza nueva.",
                "Hacer tú el prompt y enviarle las preguntas por correo para que él no tenga que aprender a usar la herramienta."
            ],
            c: 1,
            r: "El dinamizador debe fomentar el uso ético y crítico de la IA, resaltando la importancia del criterio docente en la validación de la información."
        },
        {
            t: "Hardware Avanzado - Serie Lenovo",
            q: "Tienes varias Lenovo ThinkPad T450s en el centro que reportan lentitud extrema al cargar el sistema operativo. El Director no tiene presupuesto para nuevas laptops. ¿Cuál es tu propuesta técnica de 'Upgrade'?",
            o: [
                "Formatear las laptops e instalar Windows 7 para que pesen menos.",
                "Sugerir la sustitución de los discos mecánicos por unidades SSD y, si es posible, ampliar la RAM a 8GB o 12GB, transformando equipos obsoletos en estaciones rápidas.",
                "Decirle que ya no tienen arreglo y que deben ser descargadas del inventario para enviarlas a reciclaje.",
                "Instalar un software acelerador de internet para ver si eso mejora el rendimiento del sistema."
            ],
            c: 1,
            r: "Como experto en hardware, sabes que un SSD es la mejora con mayor costo-beneficio para extender la vida útil de equipos robustos como la serie T de Lenovo."
        },
        {
            t: "Innovación - Realidad Aumentada",
            q: "Quieres implementar un proyecto de Realidad Aumentada en el centro, pero los maestros dicen que eso es 'ciencia ficción'. ¿Cómo demuestras el impacto?",
            o: [
                "Hacer una charla de 2 horas con diapositivas explicando la teoría de los hologramas.",
                "Organizar una 'Estación de Experiencia' donde los docentes vean un corazón humano en 3D latiendo sobre un libro de texto usando una tablet, vinculándolo al indicador de logro de Ciencias.",
                "Pedir al Ministerio que mande lentes de realidad virtual para todos los niños primero.",
                "Llevar a un experto de una universidad para que de una conferencia magistral."
            ],
            c: 1,
            r: "La sensibilización tecnológica es más efectiva cuando se muestra el potencial pedagógico directo en el contexto de su propia asignatura."
        },
        {
            t: "Hardware Específico - Serie Eanovo",
            q: "Las laptops Eanovo del centro presentan fallas frecuentes en el puerto de carga. ¿Qué medida de mantenimiento preventivo y correctivo estableces?",
            o: [
                "Tratar de soldar el puerto cada vez que se rompa, aunque no tengas las herramientas adecuadas.",
                "Capacitar a docentes y alumnos en la conexión correcta (sin tensión), documentar el fallo recurrente como defecto de serie y gestionar el soporte de garantía oficial del MINERD.",
                "Prohibir que los niños muevan las laptops mientras están cargando bajo pena de sanción.",
                "Poner silicona caliente alrededor del cargador para que no se mueva nunca más."
            ],
            c: 1,
            r: "La gestión profesional implica documentar fallos de serie y educar en el cuidado físico del hardware para reducir la tasa de rotura."
        },
        {
            t: "Seguridad y Ética - Uso de IA",
            q: "Descubres que un estudiante está usando IA para crear imágenes 'deepfake' (falsas) de una compañera de clase. ¿Cuál es tu responsabilidad bajo el marco de Ciudadanía Digital?",
            o: [
                "Borrar las imágenes de la computadora y no decir nada para no avergonzar a la niña.",
                "Reportar la falta grave, orientar a la comunidad sobre los riesgos legales de la IA y el respeto a la integridad ajena, y activar el protocolo de convivencia escolar.",
                "Felicitar al niño por saber usar herramientas de IA tan avanzadas.",
                "Quitarle el internet a toda la escuela para que nadie más pueda usar la IA."
            ],
            c: 1,
            r: "La ética en la IA es un componente esencial de la ciudadanía digital. Las faltas deben tratarse con enfoque formativo y correctivo inmediato."
        },
        {
            t: "Gestión de Proyectos STEAM",
            q: "En el proyecto 'Macetas Inteligentes', los sensores de humedad fallan constantemente debido a la corrosión. ¿Cómo resuelves este reto técnico/pedagógico?",
            o: [
                "Comprar sensores nuevos cada semana usando el dinero de la cafetería.",
                "Enseñar a los alumnos a aplicar una capa protectora (como esmalte) o buscar métodos de medición alternativos (sensores capacitivos), convirtiendo el fallo en una lección de ingeniería.",
                "Cancelar el proyecto y decir que la tecnología no sirve para la agricultura.",
                "Que los niños midan la humedad metiendo el dedo en la tierra y que no usen los sensores."
            ],
            c: 1,
            r: "El enfoque STEAM promueve la resolución de problemas técnicos mediante el ingenio y el aprendizaje del error."
        },
        {
            t: "Liderazgo en Gestión de Datos",
            q: "El SIGERD presenta una discrepancia en el número de estudiantes promovidos. El Director te pide que 'entres al sistema y lo cambies' sin acta previa. ¿Cómo respondes?",
            o: [
                "Hacer el cambio de inmediato porque el Director es tu jefe superior.",
                "Explicar que toda modificación en registros oficiales requiere un acta del consejo escolar y la autorización administrativa correspondiente para garantizar la transparencia.",
                "Darle tu clave al Director para que él lo haga y usted no tenga la culpa.",
                "Decir que el sistema está caído y que no se puede entrar."
            ],
            c: 1,
            r: "La integridad de los datos en los sistemas oficiales del Estado es una responsabilidad ética y legal fundamental del dinamizador."
        },
        {
            t: "Pedagogía y Pensamiento Computacional",
            q: "Quieres introducir 'Scratch' en 4to grado, pero el maestro dice que los niños 'son muy pequeños para programar'. ¿Qué argumento técnico-pedagógico utilizas?",
            o: [
                "Que es una orden del Ministerio y hay que hacerlo.",
                "Que la programación en bloques desarrolla el pensamiento lógico, la descomposición de problemas y la creatividad, competencias esenciales en la adecuación curricular.",
                "Que es como un videojuego y así los niños estarán tranquilos en el laboratorio.",
                "Que si no aprenden ahora, en el bachillerato les irá muy mal."
            ],
            c: 1,
            r: "El pensamiento computacional es una habilidad cognitiva transversal que fortalece la resolución de problemas desde edades tempranas."
        },
        {
            t: "Mantenimiento - Serie ThinkPad T430",
            q: "Tienes una T430 que se apaga sola a los 10 minutos de uso intenso. El ventilador suena muy fuerte. ¿Cuál es el diagnóstico?",
            o: [
                "La batería está agotada y necesita reemplazo.",
                "Sobrecalentamiento por obstrucción de polvo en el disipador y necesidad de cambio de pasta térmica en el procesador.",
                "El sistema operativo Windows tiene un virus que la apaga.",
                "El cargador está enviando demasiado voltaje."
            ],
            c: 1,
            r: "El apagado repentino bajo carga térmica es un mecanismo de protección del CPU. El mantenimiento preventivo físico es la solución."
        },
        {
            t: "Estrategia de Innovación Anual",
            q: "Al planificar el cierre del año para la Evaluación de Desempeño, decides crear una 'Feria Tecnológica'. ¿Cuál es el objetivo principal según los estándares?",
            o: [
                "Que el Distrito vea que el centro tiene muchos equipos electrónicos.",
                "Evidenciar el aprendizaje de los estudiantes mediante la exposición de productos digitales, proyectos STEAM y soluciones tecnológicas creadas por ellos.",
                "Ganar un premio o reconocimiento personal por parte del Ministerio.",
                "Tener muchas fotos para subir a las redes sociales del centro."
            ],
            c: 1,
            r: "La feria debe ser una muestra del desarrollo de competencias de los estudiantes, validando el impacto real de la labor del dinamizador."
        },
        {
            t: "IA y Curaduría de Contenidos",
            q: "Un docente quiere usar IA para generar un video sobre la Era de Trujillo. La IA genera un video donde Trujillo usa un smartphone. ¿Qué lección de alfabetización das?",
            o: [
                "Dejarlo así, ya que lo importante es que los niños vean un video moderno.",
                "Enseñar sobre los 'anacronismos' y las 'alucinaciones' de la IA, resaltando la necesidad de que el docente valide históricamente todo recurso generado.",
                "Borrar el video y prohibir que ese docente vuelva a usar la IA.",
                "Decirle a los estudiantes que en esa época ya existían los celulares pero eran secretos."
            ],
            c: 1,
            r: "La curaduría de contenidos asistida por IA requiere un nivel de supervisión humana constante para garantizar la veracidad pedagógica."
        },
        {
            t: "Gestión de Redes Escolares",
            q: "La red administrativa del centro está lenta porque los estudiantes están conectados con sus celulares personales. ¿Qué medida técnica tomas?",
            o: [
                "Cambiar la clave del Wi-Fi cada mañana y dársela solo a los maestros.",
                "Crear una VLAN separada para administración, ocultar el SSID administrativo y limitar el ancho de banda por dispositivo en la red de estudiantes.",
                "Apagar el Wi-Fi totalmente y que todos usen cables de red.",
                "Gritar en el recreo que todos desconecten sus celulares."
            ],
            c: 1,
            r: "La segmentación de redes y la gestión de ancho de banda (QoS) son competencias técnicas esenciales para garantizar la operatividad del centro."
        },
        {
            t: "Hardware y Ergonomía",
            q: "Muchos estudiantes reportan dolor de cuello al usar las laptops en las mesas del aula. Como Dinamizador, ¿qué sugieres al Equipo de Gestión?",
            o: [
                "Que los niños usen las laptops solo 10 minutos al día.",
                "Sugerir el uso de soportes para laptops (o materiales del medio para elevarlas) y enseñar pausas activas y ejercicios de higiene postural.",
                "Que el Ministerio compre sillas especiales de gamer para todas las aulas.",
                "Decirles que el dolor es parte del proceso de aprendizaje tecnológico."
            ],
            c: 1,
            r: "La ergonomía y la salud digital son parte de la formación integral que el dinamizador debe liderar."
        },
        {
            t: "Ética y Propiedad Intelectual",
            q: "El centro quiere publicar un manual de convivencia digital. El Director te pide copiar y pegar el manual de una escuela privada famosa sin permiso. ¿Qué respondes?",
            o: [
                "Hacerlo, pero cambiando los colores y el logo para que no se den cuenta.",
                "Proponer la creación de un documento propio, basado en nuestra realidad y citando correctamente las fuentes de inspiración bajo licencias Creative Commons.",
                "Decirle que es una excelente idea porque así ahorramos tiempo.",
                "Hacerlo y luego culpar a la coordinadora si alguien reclama."
            ],
            c: 1,
            r: "El dinamizador debe ser ejemplo de respeto a la propiedad intelectual y ética en la creación de contenidos institucionales."
        },
        {
            t: "Evaluación de Competencia Digital Docente",
            q: "Un docente usa la tecnología solo para pasar asistencia en Excel. ¿En qué nivel del modelo SAMR se encuentra y cuál es tu reto?",
            o: [
                "Nivel Redefinición; el reto es que use fórmulas más difíciles.",
                "Nivel Sustitución; el reto es acompañarlo para que pase a niveles de Aumento o Modificación donde la TIC transforme el aprendizaje.",
                "Nivel Experto; no necesita más acompañamiento porque ya sabe usar Excel.",
                "Nivel Técnico; debe aprender a reparar la computadora primero."
            ],
            c: 1,
            r: "El acompañamiento pedagógico busca elevar el nivel de integración para que la tecnología realmente impacte en cómo se aprende."
        },
        {
            t: "IA y Tutoría Personalizada",
            q: "Quieres proponer un sistema de tutoría con IA para niños con rezago en lectura en 3er grado. ¿Cuál es el enfoque correcto?",
            o: [
                "Dejar a los niños solos con la tablet y la IA para que el maestro atienda a los demás.",
                "Usar la IA como una herramienta de apoyo supervisada por el docente, que genere lecturas personalizadas basadas en los intereses de cada niño.",
                "Decir que la IA es muy peligrosa para niños tan pequeños.",
                "Cobrar a los padres por el servicio de tutoría tecnológica personalizada."
            ],
            c: 1,
            r: "La personalización del aprendizaje mediada por IA debe estar siempre bajo el diseño pedagógico y supervisión del docente."
        },
        {
            t: "Mantenimiento de Software - Imágenes de Sistema",
            q: "Debes configurar 40 laptops nuevas. ¿Cuál es el método más profesional para que todas tengan los mismos programas y bloqueos?",
            o: [
                "Instalar programa por programa en cada una de las 40 laptops.",
                "Configurar una laptop 'modelo', crear una Imagen de Sistema (Clonezilla/Ghost) y desplegarla en las demás de forma masiva.",
                "Pedir a los estudiantes que cada uno instale lo que quiera.",
                "No instalar nada y que los docentes usen solo el navegador."
            ],
            c: 1,
            r: "La clonación de discos o despliegue de imágenes garantiza la estandarización y eficiencia en la gestión de grandes lotes de equipos."
        },
        {
            t: "Liderazgo y Gestión del Cambio",
            q: "Hay una actualización importante en la plataforma del MINERD y los docentes están frustrados porque 'no entienden nada'. ¿Cuál es tu respuesta líder?",
            o: [
                "Decirles que lean el manual de 200 páginas que mandó el Ministerio.",
                "Crear un video-tutorial corto (menos de 3 min) con los cambios clave y ofrecer una sesión de 'Preguntas y Respuestas' en el recreo.",
                "Quejarse junto con los docentes de lo mala que es la plataforma.",
                "Hacerle el trabajo a cada docente para que no se estresen."
            ],
            c: 1,
            r: "El dinamizador facilita la transición tecnológica mediante recursos ágiles y apoyo presencial oportuno."
        },
        {
            t: "Hardware - Gestión de Baterías",
            q: "Detectas que los carritos tecnológicos se quedan encendidos y cargando todo el fin de semana. ¿Qué riesgo y solución planteas?",
            o: [
                "Ningún riesgo, así las laptops estarán siempre al 100%.",
                "Riesgo de degradación de baterías e incendio; la solución es instalar temporizadores en los enchufes o establecer un protocolo de desconexión.",
                "Riesgo de robo; la solución es ponerles candados más fuertes.",
                "Riesgo de que se gaste mucha luz; la solución es que los docentes las carguen en sus casas."
            ],
            c: 1,
            r: "La gestión de la infraestructura incluye la seguridad eléctrica y la preservación de la vida útil de los componentes químicos (baterías)."
        },
        {
            t: "Visión de Futuro - Dinamizador TIC",
            q: "En tu autoevaluación de desempeño, te preguntan: '¿Cuál es el mayor logro de un Dinamizador TIC?'. ¿Cuál es la respuesta que busca el MINERD?",
            o: [
                "Tener todas las laptops del centro encendidas y sin virus.",
                "Haber logrado que la tecnología sea invisible y natural en el proceso educativo, potenciando el aprendizaje de todos los estudiantes.",
                "Haber reparado más de 500 equipos durante el año escolar.",
                "Ser el que más sabe de computadoras en todo el Distrito Educativo."
            ],
            c: 1,
            r: "El éxito máximo de la dinamización es la integración invisible y efectiva de la tecnología en la cultura pedagógica del centro."
        }
    ];

    let current = 0;
    let score = 0;
    let shuffledOpts = [];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function render() {
        const data = casos[current];
        document.getElementById('blockTag').innerText = data.t;
        document.getElementById('qText').innerText = data.q;
        document.getElementById('qIdx').innerText = current + 31;
        document.getElementById('score').innerText = score * 10; // Escala de puntos

        const area = document.getElementById('optionsArea');
        area.innerHTML = '';
        
        shuffledOpts = data.o.map((text, index) => ({ text, isCorrect: index === data.c }));
        shuffle(shuffledOpts);

        shuffledOpts.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => check(idx);
            area.appendChild(btn);
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
        
        const prog = (current / casos.length) * 100;
        document.getElementById('progFill').style.width = prog + '%';
    }

    function check(idx) {
        const btns = document.querySelectorAll('.option-btn');
        const fb = document.getElementById('feedback');
        btns.forEach(b => b.disabled = true);

        if (shuffledOpts[idx].isCorrect) {
            score++;
            btns[idx].classList.add('correct');
            fb.innerHTML = `<strong>✅ VISIÓN EXPERTA:</strong> ${casos[current].r}`;
            fb.className = 'feedback correct';
        } else {
            btns[idx].classList.add('incorrect');
            const cPos = shuffledOpts.findIndex(o => o.isCorrect);
            btns[cPos].classList.add('correct');
            fb.innerHTML = `<strong>❌ ERROR ESTRATÉGICO:</strong> ${casos[current].r}`;
            fb.className = 'feedback incorrect';
        }

        fb.style.display = 'block';
        document.getElementById('nextBtn').style.display = 'inline-block';
        document.getElementById('score').innerText = score * 10;
    }

    function nextQuestion() {
        current++;
        if (current < casos.length) {
            render();
        } else {
            finish();
        }
    }

    function finish() {
        document.getElementById('quizBody').style.display = 'none';
        document.getElementById('quizFooter').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('progFill').style.width = '100%';
        document.getElementById('finalScore').innerText = score * 10;
        
        const msg = document.getElementById('resultMsg');
        const badge = document.getElementById('badge');
        const p = (score / casos.length) * 100;
        
        if (p >= 90) {
            badge.innerText = "🚀";
            msg.innerText = "¡Nivel: INNOVADOR TIC! Tienes un dominio total de la gestión, el hardware y la pedagogía digital avanzada. Estás listo para liderar a nivel regional.";
        } else if (p >= 70) {
            badge.innerText = "⚙️";
            msg.innerText = "¡Nivel: DINAMIZADOR COMPETENTE! Conoces bien tus funciones y equipos. Sigue profundizando en el uso pedagógico de la IA.";
        } else {
            badge.innerText = "📖";
            msg.innerText = "Nivel: EN CRECIMIENTO. Te recomendamos repasar los manuales de hardware específico y las guías de ética digital del MINERD.";
        }
    }

    render();
</script>

</body>
</html>
