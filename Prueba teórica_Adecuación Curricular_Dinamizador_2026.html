<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP 2026: Especialista en Adecuación Curricular</title>
    <style>
        :root { --minerd-primary: #003366; --minerd-secondary: #0056b3; --accent: #ffd700; --success: #28a745; --danger: #dc3545; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .quiz-container { background: white; width: 100%; max-width: 800px; border-radius: 15px; box-shadow: 0 12px 40px rgba(0,0,0,0.12); overflow: hidden; }
        .header { background: var(--minerd-primary); color: white; padding: 30px; text-align: center; border-bottom: 6px solid var(--accent); }
        .progress-bar { height: 10px; background: #e2e8f0; width: 100%; }
        .progress-fill { height: 100%; background: var(--success); width: 0%; transition: 0.5s ease-in-out; }
        .stats { display: flex; justify-content: space-between; padding: 15px 30px; background: #f8fafc; font-weight: bold; color: var(--minerd-primary); border-bottom: 1px solid #e2e8f0; }
        .content { padding: 40px; min-height: 400px; }
        .tag { font-size: 0.85em; text-transform: uppercase; background: #ebf4ff; color: var(--minerd-secondary); padding: 6px 16px; border-radius: 30px; display: inline-block; margin-bottom: 25px; font-weight: bold; border: 1px solid #bee3f8; }
        .question-text { font-size: 1.3em; font-weight: 600; color: #2d3748; margin-bottom: 30px; line-height: 1.6; }
        .options-list { display: grid; gap: 14px; }
        .option-btn { text-align: left; padding: 18px; border: 2px solid #edf2f7; border-radius: 12px; background: white; cursor: pointer; transition: 0.2s all; font-size: 1.05em; color: #4a5568; }
        .option-btn:hover:not(:disabled) { border-color: var(--minerd-secondary); background: #f7fafc; transform: translateY(-2px); }
        .option-btn.correct { background: #c6f6d5 !important; border-color: var(--success) !important; color: #22543d; font-weight: bold; }
        .option-btn.incorrect { background: #fed7d7 !important; border-color: var(--danger) !important; color: #822727; }
        .feedback { margin-top: 25px; padding: 20px; border-radius: 12px; display: none; line-height: 1.6; border-left: 6px solid; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .feedback.correct { background: #f0fff4; border-color: var(--success); color: #22543d; }
        .feedback.incorrect { background: #fff5f5; border-color: var(--danger); color: #822727; }
        .footer { padding: 30px 40px; text-align: right; background: #f8fafc; border-top: 1px solid #edf2f7; }
        .btn-next { background: var(--minerd-primary); color: white; border: none; padding: 14px 35px; border-radius: 8px; cursor: pointer; font-size: 1.1em; display: none; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .result-screen { text-align: center; padding: 60px 20px; display: none; }
        .final-score { font-size: 5em; font-weight: 800; color: var(--minerd-primary); margin: 20px 0; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="header">
        <h2 style="margin:0">SIMULACRO ADECUACIÓN CURRICULAR 2023</h2>
        <p style="margin:8px 0 0 0; opacity: 0.9;">Especialización para Dinamizadores TIC</p>
    </div>
    <div class="progress-bar"><div id="progFill" class="progress-fill"></div></div>
    <div class="stats">
        <span>Pregunta <span id="qIdx">1</span> de 30</span>
        <span>Puntos: <span id="score">0</span></span>
    </div>

    <div id="quizBody" class="content">
        <div id="blockTag" class="tag"></div>
        <div id="qText" class="question-text"></div>
        <div id="optionsArea" class="options-list"></div>
        <div id="feedback" class="feedback"></div>
    </div>

    <div id="resultArea" class="result-screen">
        <div class="tag">Evaluación Finalizada</div>
        <div class="final-score" id="totalScore">0</div>
        <p id="resultMsg" style="font-size: 1.3em; color: #4a5568;"></p>
        <button class="btn-next" style="display:inline-block; margin-top: 30px;" onclick="location.reload()">Reiniciar Prueba</button>
    </div>

    <div class="footer" id="quizFooter">
        <button id="nextBtn" class="btn-next" onclick="nextQuestion()">Siguiente Pregunta</button>
    </div>
</div>

<script>
    const banco = [
        // BLOQUE I: FUNDAMENTOS (1-15)
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "¿Cuál es la Ordenanza que oficializa la Adecuación Curricular de los Niveles Inicial, Primario y Secundario en 2023?", o: ["Ordenanza 04-2023.", "Ordenanza 03-2023.", "Ordenanza 01-2015.", "Ordenanza 02-2016."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "En la nueva adecuación, ¿qué sucede con las Competencias Fundamentales?", o: ["Se mantienen las 7 competencias originales, pero se vinculan de forma más directa con las específicas.", "Fueron sustituidas por Ejes Transversales.", "Se redujeron de 7 a 5 para facilitar la planificación.", "Ahora son opcionales según el contexto del centro."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "¿Qué son los 'Ejes Transversales' en la actual Adecuación Curricular?", o: ["Grandes temas sociales y de salud que permean todas las áreas del saber para una formación integral.", "La conexión física entre el laboratorio de informática y las aulas.", "Líneas que dividen las materias básicas de las especiales.", "Un tipo de evaluación diagnóstica de final de año."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "¿Cuál es la principal diferencia entre la Competencia Específica anterior y la de la Adecuación 2023?", o: ["La de 2023 está redactada de forma más operativa y alineada directamente con los indicadores de logro.", "Ya no existen las competencias específicas en el Nivel Primario.", "Ahora solo existen competencias para Lengua Española y Matemáticas.", "La de 2023 es más extensa y difícil de evaluar."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "Dentro de la Adecuación Curricular, ¿cómo se concibe el error en el proceso de aprendizaje?", o: ["Como una oportunidad para la reflexión y el ajuste de las estrategias de enseñanza-aprendizaje.", "Como un problema administrativo que el Dinamizador debe reportar.", "Como una falta que debe restarse de la nota final inmediatamente.", "Como una señal de que el estudiante no posee aptitud para el área."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "¿Cuál de estos es un Eje Transversal mencionado en la adecuación 2023 que impacta directamente la labor TIC?", o: ["Desarrollo Sostenible y Cultura Digital.", "Ciudadanía y Democracia.", "Educación Vial.", "Cuidado del Medio Ambiente."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "¿Qué componente del currículo describe el 'cómo enseñar' mediante un plan de acción organizado?", o: ["Estrategias de enseñanza-aprendizaje.", "Medios y recursos didácticos.", "Contenidos conceptuales.", "Perfil de egreso."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "En la evaluación por competencias, ¿qué significa que la evaluación sea 'procesual'?", o: ["Que se realiza de forma continua durante todo el desarrollo de la unidad, no solo al final.", "Que se hace un proceso legal al estudiante si reprueba.", "Que el estudiante debe seguir un proceso de memorización estricto.", "Que las notas se procesan únicamente en el SIGERD."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "¿Qué es la 'Situación de Aprendizaje' según la Adecuación Curricular?", o: ["Un escenario diseñado por el docente que plantea un reto o problema para generar aprendizajes significativos.", "El estado emocional del estudiante al iniciar la jornada escolar.", "Un resumen de los temas que se tratarán en el mes.", "El lugar físico (aula o laboratorio) donde se imparte la clase."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "Bajo la adecuación actual, ¿qué papel juegan los 'Contenidos'?", o: ["Son mediadores de aprendizaje para el desarrollo de las competencias.", "Son el fin último de la educación dominicana.", "Son únicamente informaciones que el alumno debe memorizar.", "Son secundarios y pueden omitirse si hay tecnología."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "¿A qué se refiere el enfoque de 'Aprendizaje a lo largo de la vida' en la adecuación?", o: ["A desarrollar la capacidad de aprender de manera autónoma y continua en diversos contextos.", "A que el estudiante nunca se graduará de la escuela.", "A un programa especial para adultos mayores.", "A que los docentes deben trabajar hasta los 80 años."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "¿Cuál es la función de los 'Recursos y Medios Didácticos' en el aula moderna?", o: ["Favorecer el desarrollo de competencias facilitando la mediación entre el docente y el estudiante.", "Sustituir la explicación del docente mediante el uso de videos.", "Demostrar que el centro escolar tiene presupuesto tecnológico.", "Entretener al estudiante para evitar la indisciplina."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "¿Qué importancia tiene la 'Alfabetización Mediática' en el nuevo currículo?", o: ["Capacita al estudiante para analizar críticamente la información y crear contenidos éticos.", "Permite al estudiante consumir anuncios de forma más rápida.", "Sirve para que el estudiante trabaje en medios de comunicación.", "Es el proceso de aprender a usar la radio y la televisión."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "En la evaluación de la adecuación 2023, ¿qué es el 'Nivel de Logro'?", o: ["La escala que indica el grado de desarrollo de una competencia (Ej. Logrado, En Proceso, Iniciado).", "La cantidad de medallas ganadas en el año.", "El número de la habitación donde se toma el examen.", "El promedio general de la sección."], c: 0 },
        { b: "Adecuación Curricular - Fundamentos Teóricos", q: "¿Quién es el responsable de realizar la adecuación curricular a nivel de aula?", o: ["El equipo de docentes, mediante su planificación y práctica diaria.", "El Ministro de Educación personalmente.", "El Director del centro educativo.", "El técnico del Distrito Escolar exclusivamente."], c: 0 },

        // BLOQUE II: CASOS PRÁCTICOS (16-30)
        { b: "Adecuación Curricular - Casos Prácticos", q: "Un docente dice que con la adecuación 2023 ya no tiene que planificar por competencias fundamentales. Como Dinamizador, ¿qué le aclaras?", o: ["Que las fundamentales siguen siendo el norte y debe seleccionar las específicas que tributen a ellas en cada unidad.", "Que las competencias fundamentales ahora las planifica el Dinamizador.", "Que eso es decisión del Director del centro.", "Que tiene razón, ahora solo se planifica por contenidos."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "Un maestro de Ciencias Sociales quiere integrar el eje transversal 'Identidad Cultural'. ¿Qué actividad TIC le sugieres?", o: ["Crear un museo virtual de la comunidad usando fotos tomadas por los alumnos y organizadas en la web.", "Dibujar el mapa de la República Dominicana en Paint.", "Ver una película de Hollywood en la PDI.", "Hacer un dictado sobre la historia dominicana en Word."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "¿Cuál es el instrumento más coherente para evaluar un proyecto de robótica educativa según la adecuación?", o: ["Una escala de estimación o rúbrica que valore el proceso de diseño, programación y trabajo en equipo.", "Contar cuántas veces el estudiante levantó la mano en clase.", "Un examen de selección múltiple sobre piezas de robots.", "Una nota subjetiva basada en si el robot se movió o no."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "Un docente usa la tablet solo para que los niños 'copien' definiciones de Wikipedia. Según la adecuación, ¿qué falta?", o: ["Falta el nivel de creación y producción de conocimiento por parte del alumno.", "No falta nada, eso es alfabetización digital.", "Falta que los niños escriban más rápido en el teclado.", "Falta que el docente use un proyector más grande."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "¿Qué evidencia es la más sólida para evaluar el impacto de la adecuación en el uso de las TIC?", o: ["Portafolios digitales de los estudiantes donde se evidencie el desarrollo de competencias mediante productos reales.", "El horario de clases pegado en la puerta.", "Las fotos de los murales físicos.", "La cantidad de laptops encendidas."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "Un alumno de 3ero tiene dificultades de lectura. El maestro quiere usar una App de cuentos. ¿Cómo se alinea esto con la adecuación?", o: ["Se alinea con la atención a la diversidad y el uso de recursos variados para el aprendizaje.", "Solo se alinea si el juego tiene sonidos de animales.", "No se alinea porque los niños de 3ero no deben usar tablets.", "Es una pérdida de tiempo si el niño no sabe leer en papel."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "¿Qué situación de aprendizaje mediada por TIC sería la más adecuada para el tema 'La Factura'?", o: ["Simular una compra en una tienda virtual y calcular el ITBIS usando hojas de cálculo.", "Ver un video de cómo se llena una factura en YouTube.", "Imprimir 30 facturas y repartirlas en el aula.", "Copiar las partes de una factura en el cuaderno."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "Un docente está preocupado porque 'no le da el tiempo'. Basado en la adecuación 2023, ¿qué le recomiendas?", o: ["Priorizar los contenidos mediadores que mejor tributen al desarrollo de las competencias específicas.", "Dar los temas más rápido sin importar si aprenden.", "Dejar de usar tecnología para ganar tiempo.", "Pedir a los padres que den los temas en casa."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "Detectas que una PDI está guardada 'para que no se dañe'. ¿Qué principio curricular se está violando?", o: ["El principio de disponibilidad y uso efectivo de los recursos para el aprendizaje.", "Ninguno, es mejor que se cuide a que se rompa.", "El principio de ahorro económico del centro.", "El derecho del Director a cuidar los bienes."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "En un blog sobre 'Energía Renovable', ¿qué competencia fundamental se trabaja predominantemente?", o: ["Competencia Científica y Tecnológica.", "Competencia de Desarrollo Personal.", "Competencia Ética.", "Competencia de Salud."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "¿Qué ventaja ofrece Kahoot para una evaluación diagnóstica según la adecuación?", o: ["Permite obtener resultados inmediatos para ajustar la enseñanza desde el primer momento.", "Garantiza que todos los niños saquen 100.", "Hace que el maestro trabaje menos.", "Sirve para que los niños se diviertan."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "¿Cuál es la propuesta más robusta para integrar 'Cultura Digital' en matemáticas de secundaria?", o: ["Uso de software de geometría dinámica (GeoGebra) para demostrar teoremas interactivos.", "Hacer ejercicios en calculadora básica.", "Escribir los números del 1 al 1000 en Word.", "Ver la biografía de Pitágoras en Wikipedia."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "En un debate online de Ética y Ciudadanía, ¿en qué debe fijarse el docente primordialmente?", o: ["En el respeto a las opiniones ajenas, calidad de argumentos y uso de fuentes confiables.", "En quién escribe más palabras por minuto.", "En que todos usen el mismo color de letra.", "En que el debate dure exactamente 45 minutos."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "¿Cómo apoya el Dinamizador TIC el proceso de 'Meta-evaluación'?", o: ["Analizando con los docentes los datos estadísticos de resultados para mejorar estrategias.", "Cambiando las notas en el SIGERD.", "Arreglando las laptops de los maestros con mejores notas.", "Imprimiendo los registros al final de mes."], c: 0 },
        { b: "Adecuación Curricular - Casos Prácticos", q: "Un docente crea su primer recurso en eXeLearning. Según la adecuación, ha avanzado en:", o: ["Su competencia de desarrollo profesional y autonomía pedagógica mediada por TIC.", "Su habilidad para no molestar al Dinamizador.", "Su nivel de entretenimiento en el aula.", "Su capacidad de ahorro de papel."], c: 0 }
    ];

    let current = 0;
    let score = 0;
    let shuffledOpts = [];

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function render() {
        const data = banco[current];
        document.getElementById('blockTag').innerText = data.b;
        document.getElementById('qText').innerText = data.q;
        document.getElementById('qIdx').innerText = current + 1;
        document.getElementById('score').innerText = score;

        const optionsArea = document.getElementById('optionsArea');
        optionsArea.innerHTML = '';
        
        shuffledOpts = data.o.map((text, index) => ({ text, isCorrect: index === data.c }));
        shuffle(shuffledOpts);

        shuffledOpts.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => select(idx);
            optionsArea.appendChild(btn);
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('nextBtn').style.display = 'none';
        
        const progress = (current / banco.length) * 100;
        document.getElementById('progFill').style.width = progress + '%';
    }

    function select(idx) {
        const btns = document.querySelectorAll('.option-btn');
        const feedback = document.getElementById('feedback');
        btns.forEach(b => b.disabled = true);

        if (shuffledOpts[idx].isCorrect) {
            score++;
            btns[idx].classList.add('correct');
            feedback.innerHTML = `<strong>✅ CORRECTO:</strong> Respuesta alineada con la Ordenanza 04-2023.`;
            feedback.className = 'feedback correct';
        } else {
            btns[idx].classList.add('incorrect');
            const cPos = shuffledOpts.findIndex(o => o.isCorrect);
            btns[cPos].classList.add('correct');
            feedback.innerHTML = `<strong>❌ INCORRECTO:</strong> Revisa los lineamientos de la adecuación curricular vigente.`;
            feedback.className = 'feedback incorrect';
        }

        feedback.style.display = 'block';
        document.getElementById('nextBtn').style.display = 'inline-block';
        document.getElementById('score').innerText = score;
    }

    function nextQuestion() {
        current++;
        if (current < banco.length) {
            render();
        } else {
            finish();
        }
    }

    function finish() {
        document.getElementById('quizBody').style.display = 'none';
        document.getElementById('quizFooter').style.display = 'none';
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('progFill').style.width = '100%';
        document.getElementById('totalScore').innerText = score;
        
        const msg = document.getElementById('resultMsg');
        const p = (score / banco.length) * 100;
        if (p >= 90) msg.innerText = "¡Nivel Excelente! Dominas perfectamente la Adecuación Curricular 2023.";
        else if (p >= 70) msg.innerText = "¡Buen nivel! Conoces los cambios principales, pero repasa los detalles técnicos.";
        else msg.innerText = "Nivel en Desarrollo. Te recomendamos leer la Ordenanza 04-2023 a fondo.";
    }

    render();
</script>

</body>
</html>
